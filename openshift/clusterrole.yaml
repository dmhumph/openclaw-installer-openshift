apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-installer
  labels:
    app.kubernetes.io/name: openclaw-installer
rules:
  # Namespace management — the installer creates per-agent namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Core resources in agent namespaces
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts", "pods", "pods/log", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Deployments in agent namespaces
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # OpenShift Routes for agent gateway access
  - apiGroups: ["route.openshift.io"]
    resources: ["routes", "routes/custom-host"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Port-forward and exec support (exec needed for device pairing approval)
  - apiGroups: [""]
    resources: ["pods/portforward", "pods/exec"]
    verbs: ["get", "create"]
  # NetworkPolicy for ingress isolation
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # EgressFirewall (OVN) for agent namespace network security
  - apiGroups: ["k8s.ovn.org"]
    resources: ["egressfirewalls"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # RBAC management in agent namespaces (for SCC RoleBindings)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings", "roles"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # SCC usage — allow the installer to grant the openclaw-agent-scc
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["openclaw-agent-scc"]
    verbs: ["use"]
