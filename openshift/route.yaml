apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openclaw-installer
  namespace: openclaw-installer
  labels:
    app.kubernetes.io/name: openclaw-installer
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  to:
    kind: Service
    name: openclaw-installer
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
