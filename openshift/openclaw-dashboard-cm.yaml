apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-openclaw-agents
  namespace: openshift-config-managed
  labels:
    console.openshift.io/dashboard: "true"
    app.kubernetes.io/name: openclaw-installer
data:
  openclaw-agents.json: |
    {
      "title": "OpenClaw / Agent Health",
      "tags": ["openclaw"],
      "editable": false,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "current": { "text": "Prometheus", "value": "prometheus" },
            "hide": 2,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "rows": [
        {
          "title": "Pod Health",
          "collapse": false,
          "panels": [
            {
              "title": "Agent Pods Ready",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "targets": [
                {
                  "expr": "sum by (namespace) (kube_pod_status_ready{condition=\"true\"} * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"})",
                  "legendFormat": "{{namespace}}"
                }
              ]
            },
            {
              "title": "Container Restarts (15m)",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "targets": [
                {
                  "expr": "sum by (namespace, container) (increase(kube_pod_container_status_restarts_total{container=~\"gateway|oauth-proxy\"}[15m]) * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"})",
                  "legendFormat": "{{namespace}}/{{container}}"
                }
              ]
            }
          ]
        },
        {
          "title": "Resource Usage",
          "collapse": false,
          "panels": [
            {
              "title": "Memory Usage",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "fieldConfig": {
                "defaults": { "unit": "bytes" }
              },
              "targets": [
                {
                  "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"} * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"})",
                  "legendFormat": "{{namespace}}"
                }
              ]
            },
            {
              "title": "CPU Usage",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "targets": [
                {
                  "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]) * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"})",
                  "legendFormat": "{{namespace}}"
                }
              ]
            }
          ]
        },
        {
          "title": "Quota Utilization",
          "collapse": false,
          "panels": [
            {
              "title": "Memory Quota Usage (%)",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "fieldConfig": {
                "defaults": { "unit": "percent", "max": 100 }
              },
              "targets": [
                {
                  "expr": "100 * sum by (namespace) (container_memory_working_set_bytes{container!=\"\"} * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"}) / on(namespace) group_left() sum by (namespace) (kube_resourcequota{resource=\"limits.memory\", type=\"hard\"})",
                  "legendFormat": "{{namespace}}"
                }
              ]
            },
            {
              "title": "CPU Quota Usage (%)",
              "type": "timeseries",
              "span": 6,
              "datasource": "$datasource",
              "fieldConfig": {
                "defaults": { "unit": "percent", "max": 100 }
              },
              "targets": [
                {
                  "expr": "100 * sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]) * on(namespace, pod) group_left() kube_pod_labels{label_app=\"openclaw\"}) / on(namespace) group_left() sum by (namespace) (kube_resourcequota{resource=\"limits.cpu\", type=\"hard\"})",
                  "legendFormat": "{{namespace}}"
                }
              ]
            }
          ]
        }
      ]
    }
