apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-installer
  namespace: openclaw-installer
  labels:
    app.kubernetes.io/name: openclaw-installer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-installer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-installer
    spec:
      serviceAccountName: openclaw-installer
      containers:
        - name: installer
          image: image-registry.openshift-image-registry.svc:5000/openclaw-installer/openclaw-installer:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            # Node network CIDR for EgressFirewall rules (OAuth/API access via node IPs).
            # Set to your cluster's node subnet for tighter control (e.g., 192.168.1.0/24).
            # Default: 10.0.0.0/8 (covers most private networks)
            - name: OPENCLAW_NODE_NETWORK
              value: "10.0.0.0/8"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: OPENAI_API_KEY
                  optional: true
            - name: MODEL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: MODEL_ENDPOINT
                  optional: true
            - name: MODEL_ENDPOINT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: MODEL_ENDPOINT_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_ALLOW_FROM
              valueFrom:
                secretKeyRef:
                  name: openclaw-installer-env
                  key: TELEGRAM_ALLOW_FROM
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: installer-data
              mountPath: /home/node/.openclaw/installer
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: installer-data
          persistentVolumeClaim:
            claimName: openclaw-installer-data
