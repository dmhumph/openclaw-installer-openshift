apiVersion: v1
kind: Secret
metadata:
  name: openclaw-installer-env
  namespace: openclaw-installer
  labels:
    app.kubernetes.io/name: openclaw-installer
type: Opaque
stringData:
  # Fill in the keys you need before applying.
  # All keys are optional — only set the ones for providers you use.
  # For Anthropic OAuth tokens, put your token here — the SDK accepts both API keys and OAuth tokens.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  # Set MODEL_ENDPOINT to your Ollama URL (e.g. http://ollama.example.com:11434/v1)
  # MODEL_ENDPOINT_API_KEY is not needed for Ollama
  MODEL_ENDPOINT: ""
  MODEL_ENDPOINT_API_KEY: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_ALLOW_FROM: ""
